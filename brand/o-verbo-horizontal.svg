  <!-- wordmark -->
  <g transform="translate(312,0)">
    <text x="0" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" letter-spacing="1" fill="#1B2A4A">O <tspan fill="#1B2A4A">Verbo</tspan></text>
