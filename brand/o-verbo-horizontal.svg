    <!-- V beam -->
    <path d="M112 70 L170 196 L228 70 L199 70 L170 132 L141 70 Z" fill="url(#gold2)"/>
    <path d="M170 196 L112 70 L141 70 L170 132 Z" fill="#0D1526" opacity="0.10"/>
    <!-- book -->
    <path d="M170 168 C141 144 105 137 78 144 L78 206 C105 199 141 206 170 230 Z" fill="url(#pageL2)"/>
    <path d="M170 168 C199 144 235 137 262 144 L262 206 C235 199 199 206 170 230 Z" fill="url(#pageR2)"/>
    <path d="M170 168 L170 230" stroke="#B9A878" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#C7BC9E" stroke-width="3" stroke-linecap="round" opacity="0.85">
