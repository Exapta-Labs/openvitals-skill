<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O Verbo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2A4A"/>
      <stop offset="1" stop-color="#0D1526"/>
    </linearGradient>
    <linearGradient id="gold" x1="256" y1="70" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBE08A"/>
      <stop offset="0.55" stop-color="#E7B64B"/>
      <stop offset="1" stop-color="#C98A2A"/>
    </linearGradient>
    <linearGradient id="pageL" x1="120" y1="300" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#D9CFB6"/>
    </linearGradient>
    <linearGradient id="pageR" x1="392" y1="300" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E7DEC8"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="250" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE9A8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFE9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="250" r="200" fill="url(#glow)"/>

  <!-- light rays of the Verb -->
  <g opacity="0.5" stroke="url(#gold)" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="92" x2="256" y2="48"/>
    <line x1="176" y1="120" x2="150" y2="84"/>
    <line x1="336" y1="120" x2="362" y2="84"/>
    <line x1="138" y1="186" x2="98" y2="168"/>
    <line x1="374" y1="186" x2="414" y2="168"/>
  </g>

  <!-- the V as a descending beam of light -->
  <path d="M168 110 L256 300 L344 110 L300 110 L256 205 L212 110 Z" fill="url(#gold)"/>
  <path d="M256 300 L168 110 L212 110 L256 205 Z" fill="#FFFFFF" opacity="0.18"/>

  <!-- open book -->
  <path d="M256 360
           C212 322 158 312 116 322
           L116 416
           C158 406 212 416 256 452 Z" fill="url(#pageL)"/>
  <path d="M256 360
           C300 322 354 312 396 322
           L396 416
           C354 406 300 416 256 452 Z" fill="url(#pageR)"/>
  <!-- spine -->
  <path d="M256 360 L256 452" stroke="#B9A878" stroke-width="6" stroke-linecap="round"/>
  <!-- page lines -->
  <g stroke="#C7BC9E" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="150" y1="352" x2="222" y2="372"/>
    <line x1="150" y1="378" x2="222" y2="398"/>
    <line x1="362" y1="352" x2="290" y2="372"/>
    <line x1="362" y1="378" x2="290" y2="398"/>
  </g>
</svg>
